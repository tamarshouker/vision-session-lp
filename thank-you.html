<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>נרשמת בהצלחה! | תמר שוקר — Leap</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #40B8BB;
      --yellow: #FDCC67;
      --purple: #BC67A5;
      --dark: #1E2340;
      --dark-2: #252B47;
      --font: 'Assistant', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--dark);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(64,184,187,0.18) 0%, transparent 70%),
                  radial-gradient(ellipse 60% 50% at 80% 100%, rgba(188,103,165,0.12) 0%, transparent 70%),
                  linear-gradient(170deg, var(--dark) 0%, var(--dark-2) 60%, #1a1f38 100%);
    }

    .page { position: relative; z-index: 1; }

    /* HERO */
    .hero {
      text-align: center;
      padding: 60px 24px 36px;
    }
    .hero-title {
      font-size: clamp(30px, 5vw, 52px);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 12px;
      animation: up 0.6s 0.15s ease both;
    }
    .hero-title .accent { color: var(--teal); }
    .hero-sub {
      font-size: clamp(15px, 2vw, 17px);
      color: rgba(255,255,255,0.55);
      max-width: 420px; margin: 0 auto;
      line-height: 1.7;
      animation: up 0.6s 0.28s ease both;
    }
    @keyframes up {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: none; }
    }

    /* VIDEO */
    .video-wrap {
      max-width: 680px; margin: 0 auto;
      padding: 0 24px;
      animation: up 0.6s 0.4s ease both;
    }
    .video-ratio {
      width: 100%; aspect-ratio: 16/9;
      border-radius: 16px; overflow: hidden;
    }
    .video-ratio iframe {
      width: 100%; height: 100%; border: none; display: block;
    }
    .video-hint {
      text-align: center;
      font-size: 13px; color: rgba(255,255,255,0.35);
      margin-top: 10px;
    }

    /* DIVIDER */
    .divider {
      max-width: 680px; margin: 48px auto;
      padding: 0 24px;
      display: flex; align-items: center; gap: 16px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .divider-text {
      font-size: 13px; color: rgba(255,255,255,0.3);
      white-space: nowrap;
    }

    /* CALENDLY */
    .calendly-wrap {
      max-width: 680px; margin: 0 auto;
      padding: 0 24px;
      animation: up 0.6s 0.55s ease both;
    }
    .calendly-heading {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 800; margin-bottom: 6px; line-height: 1.3;
      text-align: center;
    }
    .calendly-heading .accent { color: var(--yellow); }
    .calendly-desc {
      font-size: 14px; color: rgba(255,255,255,0.45);
      margin-bottom: 24px; line-height: 1.6;
      text-align: center;
    }
    .calendly-desc a { color: var(--teal); text-decoration: underline; }
    .calendly-widget-wrap {
      border-radius: 16px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    /* CLOSING */
    .closing {
      text-align: center;
      padding: 48px 24px 0;
    }
    .closing-text {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 800;
      color: var(--yellow);
      line-height: 1.3;
    }

    /* FOOTER */
    .footer {
      margin-top: 72px;
      text-align: center;
      padding: 24px;
      font-size: 13px;
      color: rgba(255,255,255,0.2);
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .footer a { color: var(--teal); }
  </style>
</head>
<body>

<div class="bg"></div>


<div class="page">

  <section class="hero">
    <h1 class="hero-title">ווהווו! 🥳 עשית זאת! <span class="accent">מתרגשת בשבילך!</span></h1>
    <p class="hero-sub">כמה דברים חשובים שכדאי לדעת לפני 👈🏼</p>
  </section>

  <div class="video-wrap">
    <div class="video-ratio">
      <iframe src="https://www.youtube.com/embed/ZnM9jXMZRKM?si=eCy03JLE_SN10neR"
        title="YouTube video player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen></iframe>
    </div>
  </div>

  <div class="divider">
    <span class="divider-text">ועכשיו — קבעו את הסשן</span>
  </div>

  <div class="calendly-wrap">
    <h2 class="calendly-heading">כאן בוחרים <span class="accent">מתי נוח לך</span> לעשות את הסשן</h2>
    <p class="calendly-desc">
      לא מצאת זמן מתאים?
      <a href="https://wa.me/+9720547862774">כתבי לי כאן וואטסאפ — 0547862774</a> ונסדר יחד 💛
    </p>
    <div class="calendly-widget-wrap">
      <div class="calendly-inline-widget"
        data-url="https://calendly.com/tamar-leap/privatesession"
        style="min-width:320px;height:700px;"></div>
    </div>
  </div>

  <div class="closing">
    <p class="closing-text">מחכה ומתרגשת להיפגש בקרוב! 💛</p>
  </div>

  <footer class="footer">
    <p>© Leap | תמר שוקר | <a href="mailto:hello@tamar-leap.com">hello@tamar-leap.com</a></p>
  </footer>

</div>

<script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>

</body>
</html>
